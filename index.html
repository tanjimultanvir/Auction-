<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🔥 MASTER AUCTION SYSTEM</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Segoe UI;
  text-align:center;
}

.card{
  background:#111827;
  margin:15px auto;
  padding:15px;
  width:360px;
  border-radius:12px;
  border:1px solid gold;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
}

#soldText{
  font-size:22px;
  color:gold;
  animation: glow 1s infinite alternate;
}

@keyframes glow{
  from{opacity:0.5;}
  to{opacity:1;}
}
</style>
</head>

<body>

<h1>🔥 MASTER AUCTION</h1>

<!-- LOGIN -->
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- ADMIN DASHBOARD -->
<div class="card">
<h2>🔥 ADMIN DASHBOARD</h2>

<input id="adminPass" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>

<hr>

<h3>🎮 Auction Control</h3>
<button onclick="nextPlayer()">Next Player</button>
<button onclick="resetAuction()">Reset Auction</button>

<hr>

<h3>💰 Set Base Price</h3>
<input id="adminPlayer" placeholder="Player Name">
<input id="adminPrice" placeholder="Base Price">
<button onclick="setBasePrice()">Set Price</button>

<hr>

<h3>🔍 Search Player</h3>
<input id="search" onkeyup="searchPlayer()" placeholder="Search...">

<div id="adminPlayers"></div>
</div>

<!-- PLAYER FORM -->
<div class="card">
<h3>Add Player</h3>
<input id="pName" placeholder="Name">
<input id="pGame" placeholder="Game ID">
<input id="pDevice" placeholder="Device">
<input id="pCategory" placeholder="Category">
<input id="pFacebook" placeholder="Facebook">

<input type="file" id="pImage">
<input type="file" id="pSS">

<button onclick="addPlayer()">Submit</button>
</div>

<!-- AUCTION -->
<div class="card">
<h2 id="playerName">Waiting...</h2>
<img id="playerImg" width="120"><br>

<h4>Base Price: <span id="basePrice">0</span></h4>
<h3>💰 <span id="bid">0</span></h3>
<h3 id="manager"></h3>

<h3>⏱️ Time Left: <span id="timer">15</span>s</h3>
<h2 id="soldText"></h2>

<input id="amount" placeholder="Bid">
<button onclick="placeBid()">Bid</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>My Team</h3>
<div id="myPlayers"></div>
<h4>Balance: <span id="balance">100000</span></h4>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<button onclick="exportPDF()">Export PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"auction-3f879.firebaseapp.com",
  databaseURL:"https://auction-3f879-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);
const auth = getAuth(app);

/* AUTH */
let user="";
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value)
.then(u=>{user=u.user.email});

/* ADMIN */
let isAdmin=false;
window.adminLogin=()=>{
if(adminPass.value==="12345"){
isAdmin=true;
alert("Admin OK");
}else alert("Wrong Password");
};

/* ADD PLAYER */
window.addPlayer=()=>{
let r1=new FileReader();
let r2=new FileReader();

r1.onload=e1=>{
r2.onload=e2=>{
push(ref(db,"players"),{
name:pName.value,
game:pGame.value,
device:pDevice.value,
category:pCategory.value,
facebook:pFacebook.value,
img:e1.target.result,
screenshot:e2.target.result,
price:0,
approved:true
});
};
r2.readAsDataURL(pSS.files[0]);
};
r1.readAsDataURL(pImage.files[0]);
};

/* LOAD PLAYERS (ADMIN VIEW) */
onValue(ref(db,"players"),snap=>{
let html="";

snap.forEach(c=>{
let d=c.val();

html+=`
<div style="border:1px solid gold;margin:5px;padding:5px;">
<b>${d.name}</b> (${d.category})<br>
💰 ${d.price||0}<br>
<button onclick="editPlayer('${c.key}')">Edit</button>
<button onclick="deletePlayer('${c.key}')">Delete</button>
</div>`;
});

adminPlayers.innerHTML=html;
});

/* EDIT */
window.editPlayer=(id)=>{
if(!isAdmin)return alert("Admin only");

let name=prompt("New Name:");
let price=prompt("New Price:");

update(ref(db,"players/"+id),{
name:name,
price:Number(price)
});
};

/* DELETE */
window.deletePlayer=(id)=>{
if(!isAdmin)return alert("Admin only");

if(confirm("Delete player?")){
set(ref(db,"players/"+id),null);
}
};

/* SEARCH */
window.searchPlayer=()=>{
let val=search.value.toLowerCase();
let cards=document.querySelectorAll("#adminPlayers div");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
};

/* BASE PRICE */
window.setBasePrice=()=>{
if(!isAdmin)return;

onValue(ref(db,"players"),snap=>{
snap.forEach(c=>{
if(c.val().name===adminPlayer.value){
update(ref(db,"players/"+c.key),{
price:Number(adminPrice.value)
});
}
});
},{onlyOnce:true});
};

/* LOAD */
let players=[];
onValue(ref(db,"players"),snap=>{
players=[];
snap.forEach(c=>{
let d=c.val();
if(d.approved) players.push({...d,id:c.key});
});
});

/* TIMER */
let timeLeft=15;
let timerInterval;

function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
timer.innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
auctionEnd();
}
},1000);
}

function resetTimer(){
timeLeft=15;
startTimer();
}

/* AUCTION */
let index=0;
window.nextPlayer=()=>{
if(!isAdmin)return alert("Admin only");

let p=players[index];

set(ref(db,"auction"),{
name:p.name,
img:p.img,
amount:p.price||0,
price:p.price||0,
manager:""
});

index=(index+1)%players.length;

soldText.innerText="";
resetTimer();
};

/* RESET */
window.resetAuction=()=>{
if(!isAdmin)return;

set(ref(db,"auction"),{
name:"Waiting...",
img:"",
amount:0,
price:0,
manager:""
});
};

/* LIVE */
onValue(ref(db,"auction"),snap=>{
let d=snap.val();
if(!d)return;

playerName.innerText=d.name;
playerImg.src=d.img;
bid.innerText=d.amount;
manager.innerText=d.manager;
basePrice.innerText=d.price;
});

/* SOLD */
function auctionEnd(){
let win=manager.innerText;

if(!win){
soldText.innerText="❌ No bids";
return;
}

soldText.innerText="🏆 SOLD to "+win;
}

/* BID */
window.placeBid=async()=>{
if(!user)return alert("Login first");

let amt=Number(amount.value);
let snap=await get(ref(db,"auction"));
let current=snap.val()?.amount||0;

let increment=100;

if(amt<current+increment){
alert("Min increment "+increment);
return;
}

set(ref(db,"auction"),{
...snap.val(),
amount:amt,
manager:user
});

push(ref(db,"teams/"+user),{
player:snap.val().name,
price:amt
});

resetTimer();
};

/* DASHBOARD */
onValue(ref(db,"teams/"+user),snap=>{
let total=0,html="";

if(!snap.exists()){
myPlayers.innerHTML="No players";
balance.innerText=100000;
return;
}

snap.forEach(c=>{
let d=c.val();
total+=d.price;
html+=`<div>${d.player} → ${d.price}</div>`;
});

myPlayers.innerHTML=html;
balance.innerText=100000-total;
});

/* LEADERBOARD */
onValue(ref(db,"teams"),snap=>{
let arr=[];
snap.forEach(t=>{
let total=0;
t.forEach(p=>total+=p.val().price);
arr.push({team:t.key,total});
});
arr.sort((a,b)=>b.total-a.total);
leaderboard.innerHTML=arr.map((t,i)=>`#${i+1} ${t.team} → ${t.total}`).join("");
});

/* PDF */
window.exportPDF=()=>{
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Auction Result",10,10);
doc.save("auction.pdf");
};

</script>

</body>
</html>
